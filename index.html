<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Навигатор восстановления — самопроверка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --plum:#3C184B;
    --plum-deep:#2A0F35;
    --plum-soft:#52265F;
    --gold:#C8A86B;
    --gold-soft:#E0CFA6;
    --cream:#F4EEE4;
    --cream-dim:#C9BEB0;
    --line:rgba(200,168,107,.28);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Raleway',sans-serif;
    background:
      radial-gradient(120% 90% at 80% -10%, #5a2a68 0%, rgba(90,42,104,0) 55%),
      radial-gradient(110% 80% at -10% 110%, #2a0f35 0%, rgba(42,15,53,0) 60%),
      linear-gradient(160deg,var(--plum) 0%,var(--plum-deep) 100%);
    background-attachment:fixed;
    color:var(--cream);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:28px 18px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .stage{width:100%;max-width:600px}
  .card{
    background:linear-gradient(165deg,rgba(82,38,95,.55),rgba(42,15,53,.5));
    border:1px solid var(--line);
    border-radius:20px;
    padding:38px 30px 32px;
    backdrop-filter:blur(6px);
    box-shadow:0 30px 70px -30px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.04);
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    opacity:.7;
  }
  .screen{animation:fade .5s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .eyebrow{
    font-size:11px;letter-spacing:.32em;text-transform:uppercase;
    color:var(--gold);font-weight:600;margin-bottom:16px;
  }
  h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:33px;line-height:1.15;margin-bottom:16px;color:var(--cream)}
  h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:27px;line-height:1.2;margin-bottom:14px;color:var(--cream)}
  p{color:var(--cream-dim);font-weight:300;font-size:15.5px;margin-bottom:14px}
  p strong{color:var(--cream);font-weight:500}
  .q-text{font-family:'Cormorant Garamond',serif;font-size:24px;line-height:1.28;color:var(--cream);margin-bottom:24px;font-weight:500}

  .progress{height:3px;background:rgba(255,255,255,.08);border-radius:3px;margin-bottom:26px;overflow:hidden}
  .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--gold-soft),var(--gold));width:0;transition:width .45s cubic-bezier(.4,0,.2,1)}
  .step-label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:18px;opacity:.85}

  .opts{display:flex;flex-direction:column;gap:10px;margin-top:8px}
  .opt{
    text-align:left;width:100%;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(200,168,107,.22);
    color:var(--cream);
    padding:15px 18px;border-radius:13px;
    font-family:'Raleway',sans-serif;font-size:15px;font-weight:400;
    cursor:pointer;transition:all .2s ease;
    display:flex;align-items:center;gap:14px;
  }
  .opt:hover{border-color:var(--gold);background:rgba(200,168,107,.1);transform:translateX(3px)}
  .opt .dot{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--gold);flex-shrink:0;transition:.2s}
  .opt:hover .dot{background:var(--gold);box-shadow:0 0 10px var(--gold)}
  .opt .num{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);width:18px;flex-shrink:0}

  .btn{
    display:inline-flex;align-items:center;gap:10px;
    background:linear-gradient(120deg,var(--gold),#b9954f);
    color:var(--plum-deep);
    border:none;padding:15px 30px;border-radius:40px;
    font-family:'Raleway',sans-serif;font-weight:600;font-size:14.5px;letter-spacing:.04em;
    cursor:pointer;transition:.25s;margin-top:8px;
    box-shadow:0 12px 30px -12px rgba(200,168,107,.7);
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 18px 36px -14px rgba(200,168,107,.85)}
  .btn.ghost{background:transparent;color:var(--gold);border:1px solid var(--line);box-shadow:none}
  .btn.ghost:hover{background:rgba(200,168,107,.1)}

  .disclaimer{
    margin-top:24px;padding-top:18px;border-top:1px solid rgba(255,255,255,.08);
    font-size:12.5px;color:var(--cream-dim);opacity:.75;font-weight:300;letter-spacing:.01em;
  }
  .consent-note{font-size:12.5px;color:var(--cream-dim);opacity:.8;margin-top:14px;font-weight:300}

  /* profile bars */
  .zone{margin-bottom:18px}
  .zone-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
  .zone-name{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--cream)}
  .zone-word{font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--gold-soft)}
  .bar{height:7px;background:rgba(255,255,255,.07);border-radius:6px;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:6px;width:0;transition:width .9s cubic-bezier(.34,1.2,.5,1)}
  .zone.dom .zone-name{color:var(--gold)}

  .route-step{
    display:flex;gap:16px;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.07);
  }
  .route-step:last-child{border-bottom:none}
  .route-num{
    font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);
    flex-shrink:0;width:30px;line-height:1;
  }
  .route-body h3{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:19px;color:var(--cream);margin-bottom:4px}
  .route-body .meta{font-size:12px;color:var(--gold-soft);letter-spacing:.05em;margin-bottom:6px}
  .route-body p{margin-bottom:0;font-size:14px}
  .tag{display:inline-block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid var(--line);color:var(--gold-soft);margin-left:6px;vertical-align:middle}
  .free{background:rgba(200,168,107,.14);color:var(--gold);border-color:transparent}

  .lead-in{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:var(--gold-soft);margin:8px 0 18px}
  .cta-box{margin-top:22px;padding:20px;border:1px solid var(--line);border-radius:14px;background:rgba(200,168,107,.05)}
  .cta-box h3{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:21px;color:var(--cream);margin-bottom:8px}
  .restart{margin-top:18px;text-align:center}
  .restart a{color:var(--cream-dim);font-size:12.5px;text-decoration:none;border-bottom:1px solid var(--line);padding-bottom:1px;cursor:pointer}
  .restart a:hover{color:var(--gold)}
</style>
</head>
<body>
<div class="stage">
  <div class="card">
    <div id="app"></div>
  </div>
</div>

<script>
/* ============================================================
   ЛОГИКА (детерминированно, как в дизайне v1.2):
   фильтр А → фильтр Б → 4 зоны → профиль → сборка маршрута.
   Тексты исходов и слотов — голосом Алексея (шаблоны;
   в продакшене эти слоты формулирует LLM, шаблон = фолбэк).
============================================================ */

/* === КУДА ВЕДЁТ КНОПКА «ЗАПИСАТЬСЯ НА РАЗБОР» ===
   Поменять можно здесь — одну строку. Сейчас: личка Алексея в VK. */
const BOOKING_URL = 'https://vk.com/aleksey_relaxolog_chistyakov';
function goToBooking(){ window.open(BOOKING_URL, '_blank'); }

const state = { flagA:false, contra:false, flagB:false, core:{}, idx:0 };

// ---- Фильтр А ----
const filterA = [
  {id:'a1', text:'За последнее время были резкая или непривычная боль, головокружения, проблемы с давлением или сердцем?', trigger:'A'},
  {id:'a2', text:'Есть симптомы, которые держатся дольше нескольких недель и мешают обычной жизни?', trigger:'A'},
  {id:'a3', text:'Сейчас наблюдаетесь у врача или принимаете назначенное лечение по тому, что вас беспокоит?', trigger:'contra'},
  {id:'a4', text:'Беременность, недавняя операция или травма?', trigger:'contra'}
];

// ---- Фильтр Б ----
const filterB = [
  {id:'b1', text:'Когда вам не хватает сна — это потому что…', opts:[
    {label:'Физически не остаётся времени: поздно ложусь, рано встаю', flag:true},
    {label:'Время есть, но не получается уснуть / просыпаюсь', flag:false},
    {label:'Сна мне в целом хватает', flag:false}
  ]},
  {id:'b2', text:'Когда у вас в последний раз был день совсем без задач и обязательств?', opts:[
    {label:'Регулярно бывают', flag:false},
    {label:'Редко, но случаются', flag:false},
    {label:'Не помню / месяцами нет', flag:true}
  ]},
  {id:'b3', text:'Бывают ли в течение дня паузы — хотя бы 10–15 минут ни на что?', opts:[
    {label:'Да, бывают', flag:false},
    {label:'Редко', flag:false},
    {label:'Почти никогда', flag:false}
  ]}
];

// ---- Ядро: 4 зоны × 2 вопроса (inv = обратный) ----
const zones = [
  {key:'tension', name:'Напряжение', q:[
    {text:'К концу дня я замечаю зажатость в плечах, шее или челюсти'},
    {text:'Когда я хочу расслабить тело, оно всё равно продолжает «держать» само'}
  ]},
  {key:'sleep', name:'Сон', q:[
    {text:'Я просыпаюсь так, будто почти не спал'},
    {text:'Засыпаю с «крутящимися» мыслями'}
  ]},
  {key:'body', name:'Контакт с телом', q:[
    {text:'Я замечаю сигналы тела — усталость, голод, напряжение — заранее, до того как станет проблемой', inv:true},
    {text:'Большую часть дня я живу «в голове», тело почти не замечаю'}
  ]},
  {key:'relax', name:'Расслабление', q:[
    {text:'У меня получается отключиться от работы, когда я не работаю', inv:true},
    {text:'Отдых меня не восстанавливает — я просто «выключаюсь»'}
  ]}
];

const scaleOpts = ['совсем не про меня','редко','часто','прямо про меня'];

// ---- Маршрут: бесплатный первый шаг по зоне ----
const freeStep = {
  tension:{t:'Отпустить плечи и челюсть', p:'Прямо сейчас, 60 секунд: на длинном медленном выдохе сознательно опустите плечи и расслабьте челюсть. Замечайте, насколько они были подняты.'},
  sleep:{t:'Вечернее замедление дыхания', p:'Сегодня перед сном — несколько минут спокойного дыхания, где выдох длиннее вдоха. Это мягко переключает тело в режим отдыха.'},
  body:{t:'Короткое сканирование тела', p:'1–2 минуты внимания: пройдитесь вниманием от макушки до стоп, просто отмечая, где есть напряжение. Ничего не меняя.'},
  relax:{t:'Одно переключение + «ОМ»', p:'Сегодня — одно действие только на переключение, не по делам. И, если откликается, пропойте несколько раз «ОМ» на выдохе: размеренное пение помогает телу выдохнуть.'}
};

// ---- Инструменты по зонам (из матрицы) ----
const zoneGroup = {
  tension:{soft:'Групповая звукотерапия / звуковая ванна', hard:'Группа с телесной разрядкой'},
  sleep:{soft:'Групповая звукотерапия (йога-нидра)', hard:'Групповая звукотерапия (йога-нидра)'},
  body:{soft:'Телесно-голосовой тренинг', hard:'Телесно-голосовой тренинг'},
  relax:{soft:'Группа «Мнуши» / групповая звукотерапия', hard:'Группа «Мнуши» / групповая звукотерапия'}
};
const zoneCosmetic = {
  tension:'Разогревающее средство для домашнего ритуала — в паре с самомассажем или дыханием',
  sleep:'Вечерний успокаивающий аромат-ритуал — в паре с дыхательной практикой',
  body:'Средство для самомассажа, где сам ритуал нанесения = практика контакта с телом',
  relax:'Домашний ритуал расслабления в связке со звуком — в паре с прослушиванием чаш'
};
const zoneLabel = {tension:'напряжение',sleep:'сон',body:'контакт с телом',relax:'расслабление'};

const app = document.getElementById('app');

function render(html){ app.innerHTML = '<div class="screen">'+html+'</div>'; }
function progress(pct){ return '<div class="progress"><i style="width:'+pct+'%"></i></div>'; }

/* ---------- ИНТРО ---------- */
function intro(){
  render(`
    <div class="eyebrow">Навигатор восстановления</div>
    <h1>За пару минут — заметить, что с вами происходит</h1>
    <p>Эта короткая самопроверка помогает увидеть, где сейчас сильнее всего держится напряжение: тело, сон, контакт с собой или переключение.</p>
    <p>Сразу честно: <strong>это не медицина и не диагноз.</strong> Я не ставлю оценок здоровью — это просто ориентир, чтобы понять, с чего вам стоит начать.</p>
    <p>Отвечайте как есть — первым, что приходит.</p>
    <button class="btn" onclick="startA()">Начать проверку →</button>
    <div class="consent-note">Нажимая «Начать», вы соглашаетесь, что это самооценка состояния, а не медицинская диагностика.</div>
  `);
}

/* ---------- ФИЛЬТР А ---------- */
let aIdx=0;
function startA(){ aIdx=0; state.flagA=false; state.contra=false; askA(); }
function askA(){
  const q=filterA[aIdx];
  render(`
    ${progress(8 + aIdx*6)}
    <div class="step-label">Несколько вопросов для начала</div>
    <div class="q-text">${q.text}</div>
    <div class="opts">
      <button class="opt" onclick="answerA(true)"><span class="dot"></span>Да</button>
      <button class="opt" onclick="answerA(false)"><span class="dot"></span>Нет</button>
    </div>
  `);
}
function answerA(yes){
  const q=filterA[aIdx];
  if(yes && q.trigger==='A') state.flagA=true;
  if(yes && q.trigger==='contra') state.contra=true;
  aIdx++;
  if(aIdx<filterA.length){ askA(); }
  else if(state.flagA){ outcomeA(); }
  else { startB(); }
}

/* ---------- ФИЛЬТР Б ---------- */
let bIdx=0;
function startB(){ bIdx=0; state.flagB=false; askB(); }
function askB(){
  const q=filterB[bIdx];
  render(`
    ${progress(34 + bIdx*6)}
    <div class="step-label">Про сон и паузы</div>
    <div class="q-text">${q.text}</div>
    <div class="opts">
      ${q.opts.map((o,i)=>`<button class="opt" onclick="answerB(${o.flag})"><span class="dot"></span>${o.label}</button>`).join('')}
    </div>
  `);
}
function answerB(flag){
  if(flag) state.flagB=true;
  bIdx++;
  if(bIdx<filterB.length){ askB(); }
  else if(state.flagB){ outcomeB(); }
  else { startCore(); }
}

/* ---------- ЯДРО ---------- */
let qFlat=[];
function startCore(){
  qFlat=[];
  zones.forEach(z=>z.q.forEach((q,i)=>qFlat.push({zone:z.key, zoneName:z.name, ...q})));
  state.core={}; state.idx=0; askCore();
}
function askCore(){
  const q=qFlat[state.idx];
  render(`
    ${progress(56 + (state.idx/qFlat.length)*40)}
    <div class="step-label">${q.zoneName}</div>
    <div class="q-text">${q.text}</div>
    <div class="opts">
      ${scaleOpts.map((label,val)=>`<button class="opt" onclick="answerCore(${val})"><span class="num">${val}</span>${label}</button>`).join('')}
    </div>
  `);
}
function answerCore(val){
  const q=qFlat[state.idx];
  const score = q.inv ? (3-val) : val;        // обратные вопросы инвертируем
  if(!state.core[q.zone]) state.core[q.zone]=0;
  state.core[q.zone]+=score;
  state.idx++;
  if(state.idx<qFlat.length){ askCore(); } else { result(); }
}

/* ---------- ПРОФИЛЬ + МАРШРУТ ---------- */
function pct(zoneKey){ return Math.round((state.core[zoneKey]/6)*100); }
function word(p){
  if(p<40) return {w:'в порядке', c:'#9fd9b0'};
  if(p<60) return {w:'потихоньку копится', c:'#E0CFA6'};
  if(p<80) return {w:'заметно просело', c:'#e6b15a'};
  return {w:'просело сильнее всего', c:'#d98c6a'};
}

function result(){
  const ordered=[...zones].map(z=>({...z,p:pct(z.key)})).sort((a,b)=>b.p-a.p);
  const dominant=ordered.filter(z=>z.p>=60).slice(0,2);
  const lead = dominant.length?dominant: [ordered[0]]; // если ничего ≥60 — ведём топ-1 мягко
  const contra=state.contra;

  // полоски профиля
  const bars=ordered.map(z=>{
    const wd=word(z.p);
    const isDom=lead.some(d=>d.key===z.key);
    return `<div class="zone ${isDom?'dom':''}">
      <div class="zone-head"><span class="zone-name">${z.name}</span><span class="zone-word" style="color:${wd.c}">${wd.w}</span></div>
      <div class="bar"><i style="width:${z.p}%;background:linear-gradient(90deg,${wd.c},${wd.c}aa)"></i></div>
    </div>`;
  }).join('');

  // маршрут
  const top=lead[0].key;
  const fs=freeStep[top];
  let steps=`
    <div class="route-step">
      <div class="route-num">1</div>
      <div class="route-body">
        <h3>${fs.t} <span class="tag free">сегодня · бесплатно</span></h3>
        <p>${fs.p}</p>
      </div>
    </div>`;
  let n=2;
  // индивидуальная сессия
  steps+=`
    <div class="route-step">
      <div class="route-num">${n++}</div>
      <div class="route-body">
        <h3>Индивидуальная сессия <span class="tag">не-косметика</span></h3>
        <div class="meta">≈ 2 часа · 10 000 ₽ (8 000 ₽ со скидкой)</div>
        <p>${contra?'Мягкий формат: телесная работа без интенсива, плюс звук — под ваше состояние.':'Телесная работа, звук и работа с состоянием — глубже, чем самостоятельная практика.'}</p>
      </div>
    </div>`;
  // группа по доминирующей зоне
  const grp = contra ? zoneGroup[top].soft : zoneGroup[top].hard;
  steps+=`
    <div class="route-step">
      <div class="route-num">${n++}</div>
      <div class="route-body">
        <h3>${grp} <span class="tag">не-косметика</span></h3>
        <div class="meta">≈ 3 часа · 1700 ₽ чел · 3000 ₽ пара</div>
        <p>Камерная группа — мягкий способ войти в практику рядом с другими.</p>
      </div>
    </div>`;
  // косметика — только дальше и в паре
  steps+=`
    <div class="route-step">
      <div class="route-num">${n++}</div>
      <div class="route-body">
        <h3>Домашний ритуал со средством Spaquatoria <span class="tag">косметика · в паре</span></h3>
        <p>${zoneCosmetic[top]}. Это поддержка между встречами, а не замена практике.</p>
      </div>
    </div>`;

  const domNames = lead.map(z=>zoneLabel[z.key]).join(' и ');

  render(`
    <div class="eyebrow">Ваш профиль состояния</div>
    <h2>Вот что получилось</h2>
    <p>Это не оценка и не диагноз — просто карта, где сейчас держится больше всего. ${contra?'Учитываю, что вы отметили: маршрут держу в мягких форматах.':''}</p>
    <div style="margin:22px 0 26px">${bars}</div>
    <p class="lead-in">Сильнее всего сейчас просело: ${domNames}. С этого и начнём.</p>
    <div class="step-label">Ваш маршрут — по одному шагу</div>
    <div style="margin-top:10px">${steps}</div>

    <div class="cta-box">
